<html>
<head>
  <title>team w00dkidd</title>
  <script src="https://cloudflare.com" async defer></script>
    
  <style>
    #main-content { 
      display: none; 
      text-align: center;
      margin-top: 50px;
    }
    #captcha-container { 
      text-align: center; 
      margin-top: 100px; 
      font-family: Arial, sans-serif;
    }
    .cf-turnstile {
      display: inline-block;
      min-width: 300px;
      min-height: 65px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="captcha-container">
    <h2>Please verify you are human to enter</h2>
    <div class="cf-turnstile" data-sitekey="0x4AAAAAADrF0c_Yt3F2YBid" data-callback="onSuccess"></div>
  </div>

  <div id="main-content">
    <img src="https://urlto.me">
  </div>

  <script>
    function onSuccess(token) {
        document.getElementById('captcha-container').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }
  </script>

</body>
</html>
